version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: joblog-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: joblog-backend
    ports:
      - "5000:5000"
    env_file:
      - .env                    # ← explicitly load root .env
    environment:
      - REDIS_URL=redis://redis:6379   # ← override redis URL only
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: joblog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped